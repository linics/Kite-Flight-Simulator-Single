<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>风筝飞行：力的平衡实验室</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f6fb;
      color: #1d2a3b;
      display: flex;
      min-height: 100vh;
    }

    #app {
      display: flex;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px;
      gap: 24px;
    }

    #canvas-container {
      flex: 1 1 65%;
      position: relative;
      min-width: 900px;
      min-height: 540px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    #control-panel {
      flex: 0 0 320px;
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px 24px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .slider-group, .toggle-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-group label {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
    }

    .hint {
      font-size: 12px;
      color: #6d7b8a;
      margin-top: -6px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .data-panel {
      background: #f4f7ff;
      border-radius: 12px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 12px;
      font-size: 13px;
    }

    .data-panel .label {
      color: #4e5d73;
      font-weight: 600;
    }

    .status {
      font-size: 16px;
      font-weight: 700;
      margin-top: 4px;
      color: #2f5597;
    }

    canvas {
      display: block;
    }

    .legend {
      position: absolute;
      right: 24px;
      bottom: 20px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      color: #2e3b50;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .legend-swatch {
      width: 16px;
      height: 4px;
      border-radius: 2px;
    }

    @media (max-width: 1280px) {
      #app {
        flex-direction: column;
        align-items: center;
      }

      #canvas-container {
        width: 100%;
        min-width: 900px;
      }

      #control-panel {
        width: 100%;
        max-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div class="legend">
        <div class="legend-item"><span class="legend-swatch" style="background:#00bcd4"></span>风压 / Normal</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#ff9800"></span>阻力 / Drag</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#c62828"></span>重力 / Weight</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#8e24aa"></span>张力 / Tension</div>
        <div class="legend-item"><span class="legend-swatch" style="background:linear-gradient(90deg,#607d8b 50%, transparent 50%);"></span>垂向残差 / Residual</div>
      </div>
    </div>
    <div id="control-panel">
      <h1>控制面板 Control</h1>
      <div class="slider-group">
        <label>风速 v_wind（m/s）<span id="wind-value">6.00</span></label>
        <input id="wind-slider" type="range" min="0" max="15" step="0.1" value="6" />
      </div>
      <div class="slider-group">
        <label>线角 θ（°）<span id="theta-value">35.0</span></label>
        <input id="theta-slider" type="range" min="5" max="65" step="0.5" value="35" />
        <div class="hint">建议线角 30°–50°（约 45° 更易起飞）；过拉/过松都会失败。</div>
      </div>
      <div class="slider-group">
        <label>面偏角 β（°）<span id="beta-value">10.0</span></label>
        <input id="beta-slider" type="range" min="0" max="20" step="0.5" value="10" />
      </div>
      <div class="slider-group">
        <label>配重 ballast<span id="ballast-value">0.40</span></label>
        <input id="ballast-slider" type="range" min="0" max="1" step="0.01" value="0.4" />
      </div>
      <div class="toggle-group">
        <label class="toggle"><input id="vectors-toggle" type="checkbox" checked />显示向量</label>
        <label class="toggle"><input id="stability-toggle" type="checkbox" checked />稳定判定</label>
      </div>
      <div class="data-panel">
        <div class="label">风压 F_windN</div><div id="fw-display">0.00</div>
        <div class="label">阻力 F_drag</div><div id="fd-display">0.00</div>
        <div class="label">张力 T</div><div id="t-display">0.00</div>
        <div class="label">重力 W</div><div id="w-display">0.00</div>
        <div class="label">残差 R_perp</div><div id="r-display">0.00</div>
      </div>
      <div class="status">状态：<span id="status-text">初始化...</span></div>
    </div>
  </div>

  <script>
    // ===================== 常量与工具 =====================
    const rho = 1.2;     // 空气密度 kg/m^3
    const S = 0.18;      // 参考受风面积 m^2
    const m = 0.12;      // 风筝质量 kg
    const g = 9.81;
    const kDrag = 0.04;  // 粗略阻力系数项
    const qClamp = [0, 300];   // 动压钳制，避免发散
    const eps = 0.15, eps2 = 0.12, threshold = 0.6;
    const deg = Math.PI / 180;

    // 画布与交互控件引用
    let canvas;
    let windSlider, thetaSlider, betaSlider, ballastSlider;
    let vectorsToggle, stabilityToggle;

    // 用于轻微摆动的计时
    let wobblePhase = 0;

    // =============== 工具函数 ===============
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function fmt(num) {
      return (Math.round(num * 100) / 100).toFixed(2);
    }

    function normalizeAngle(angle) {
      return ((angle + Math.PI) % (2 * Math.PI)) - Math.PI;
    }

    function drawArrow(baseX, baseY, vecX, vecY, color) {
      const len = Math.hypot(vecX, vecY);
      if (len < 1e-3) return;
      const scale = 80; // 基础缩放
      const clampedLen = clamp(len * scale, -200, 200);
      const dirX = vecX / len;
      const dirY = vecY / len;
      const tipX = baseX + dirX * clampedLen;
      const tipY = baseY + dirY * clampedLen;
      stroke(color);
      strokeWeight(3);
      line(baseX, baseY, tipX, tipY);
      push();
      translate(tipX, tipY);
      rotate(Math.atan2(dirY, dirX));
      const arrowSize = 10;
      fill(color);
      noStroke();
      triangle(0, 0, -arrowSize, arrowSize / 2, -arrowSize, -arrowSize / 2);
      pop();
    }

    function drawDashedLine(x1, y1, x2, y2, dashLength = 8) {
      const totalLength = Math.hypot(x2 - x1, y2 - y1);
      if (totalLength < 1e-3) return;
      const steps = Math.floor(totalLength / dashLength);
      const dx = (x2 - x1) / steps;
      const dy = (y2 - y1) / steps;
      for (let i = 0; i < steps; i += 2) {
        const sx = x1 + dx * i;
        const sy = y1 + dy * i;
        line(sx, sy, sx + dx, sy + dy);
      }
    }

    function setup() {
      const container = document.getElementById('canvas-container');
      const width = Math.max(900, container.clientWidth);
      const height = Math.max(540, container.clientHeight);
      canvas = createCanvas(width, height);
      canvas.parent('canvas-container');

      // 连接滑块与开关
      windSlider = document.getElementById('wind-slider');
      thetaSlider = document.getElementById('theta-slider');
      betaSlider = document.getElementById('beta-slider');
      ballastSlider = document.getElementById('ballast-slider');
      vectorsToggle = document.getElementById('vectors-toggle');
      stabilityToggle = document.getElementById('stability-toggle');

      // 窗口自适应
      windowResized();
    }

    function windowResized() {
      const container = document.getElementById('canvas-container');
      const width = Math.max(900, container.clientWidth);
      const height = Math.max(540, container.clientHeight);
      resizeCanvas(width, height);
    }

    function draw() {
      background(240, 246, 255);

      // 读取 UI 参数
      const v_wind = parseFloat(windSlider.value);
      const thetaDeg = parseFloat(thetaSlider.value);
      const betaDeg = parseFloat(betaSlider.value);
      const ballast = parseFloat(ballastSlider.value);

      // 更新滑块数值显示
      document.getElementById('wind-value').textContent = fmt(v_wind);
      document.getElementById('theta-value').textContent = fmt(thetaDeg);
      document.getElementById('beta-value').textContent = fmt(betaDeg);
      document.getElementById('ballast-value').textContent = fmt(ballast);

      // ================= 物理计算 =================
      const theta = thetaDeg * deg;
      const beta = betaDeg * deg;
      const phi = theta + beta;

      const v = Math.max(0, v_wind);
      const q = 0.5 * rho * v * v;
      const qC = clamp(q, qClamp[0], qClamp[1]);

      const F_windN = qC * S * Math.abs(Math.sin(phi));
      const n_hat = { x: -Math.sin(phi), y: Math.cos(phi) };
      const F_drag = kDrag * v * v;
      const d_hat = { x: -1, y: 0 };

      const Fx_w = F_windN * n_hat.x + F_drag * d_hat.x;
      const Fy_w = F_windN * n_hat.y + F_drag * d_hat.y;

      const Fx_g = 0;
      const Fy_g = -m * g;

      const t_hat = { x: Math.cos(theta), y: Math.sin(theta) };
      const Rx = Fx_w + Fx_g;
      const Ry = Fy_w + Fy_g;
      const R_parallel = Rx * t_hat.x + Ry * t_hat.y;
      const Rpx = Rx - R_parallel * t_hat.x;
      const Rpy = Ry - R_parallel * t_hat.y;
      const RperpNorm = Math.hypot(Rpx, Rpy);

      let T = -R_parallel;
      if (T < 0) T = 0;
      const Fx_T = -T * t_hat.x;
      const Fy_T = -T * t_hat.y;

      const phi0 = theta + beta;
      const dphi = normalizeAngle(phi - phi0);
      const kRestore = lerp(0.0, 0.9, ballast);
      const F_restore_y = -kRestore * dphi;

      const Fx = Fx_w + Fx_T + Fx_g;
      const Fy = Fy_w + Fy_T + Fy_g + F_restore_y;

      // ================= 状态判定 =================
      let statusText = '解析中...';
      if (!stabilityToggle.checked) {
        statusText = '状态评估已关闭';
      } else if (v < 0.5) {
        statusText = '无风 / No wind';
      } else if (Math.abs(Fx) < eps && Math.abs(Fy) < eps && RperpNorm < eps2) {
        statusText = '稳定飞行 / Steady';
      } else if ((Fy_w + Fy_T + F_restore_y) > (m * g * 0.8) && thetaDeg >= 30 && thetaDeg <= 50) {
        statusText = '起飞 / Take-off';
      } else if (thetaDeg > 55 || RperpNorm > threshold) {
        statusText = '不稳/失速 / Unstable';
      } else {
        statusText = '调整中 / Adjusting';
      }

      document.getElementById('status-text').textContent = statusText;

      // ================= 数据显示 =================
      document.getElementById('fw-display').textContent = fmt(Math.max(0, F_windN));
      document.getElementById('fd-display').textContent = fmt(Math.max(0, F_drag));
      document.getElementById('t-display').textContent = fmt(Math.max(0, T));
      document.getElementById('w-display').textContent = fmt(Math.max(0, m * g));
      document.getElementById('r-display').textContent = fmt(Math.max(0, RperpNorm));

      // ================= 布局参数 =================
      const margin = 80;
      const handleX = margin;
      const handleY = height - margin;
      const lineLen = Math.min(width * 0.55, height * 0.75);
      const kiteX = handleX + lineLen * Math.cos(theta);
      const kiteY = handleY - lineLen * Math.sin(theta);

      // 摆动效果：接近稳态时小幅上下浮动
      const nearSteady = Math.abs(Fx) < 0.35 && Math.abs(Fy) < 0.35 && RperpNorm < 0.25;
      let wobbleOffset = 0;
      if (nearSteady) {
        wobblePhase += 0.06;
        wobbleOffset = Math.sin(wobblePhase) * 2;
      } else {
        wobblePhase *= 0.9;
      }

      const kiteCenter = { x: kiteX, y: kiteY + wobbleOffset };

      // ================= 绘制背景与元素 =================
      // 背景渐变天空
      noStroke();
      for (let i = 0; i < height; i++) {
        const t = i / height;
        const c = lerpColor(color('#9ec5ff'), color('#e3f2fd'), t);
        stroke(c);
        line(0, i, width, i);
      }

      // 手柄与地面
      stroke(120);
      strokeWeight(3);
      line(0, handleY + 10, width, handleY + 10);
      fill(80);
      noStroke();
      rect(handleX - 6, handleY - 24, 12, 24, 4);

      // 牵引线
      stroke(80, 80, 120);
      strokeWeight(1.5);
      line(handleX, handleY, kiteCenter.x, kiteCenter.y);

      // 绘制风向箭头（背景参考）
      stroke(60, 140, 220);
      strokeWeight(2);
      const arrowY = margin;
      line(margin, arrowY, margin + 120, arrowY);
      line(margin + 120, arrowY, margin + 100, arrowY - 10);
      line(margin + 120, arrowY, margin + 100, arrowY + 10);
      noStroke();
      fill(60, 140, 220);
      textAlign(LEFT, CENTER);
      textSize(14);
      text('来流（从左到右）', margin + 130, arrowY);

      // 绘制风筝
      push();
      translate(kiteCenter.x, kiteCenter.y);
      rotate(-phi); // p5 旋转方向与数学方向相反
      fill(255, 160, 0, 200);
      stroke(230, 120, 0);
      strokeWeight(2);
      const size = 80;
      beginShape();
      vertex(0, -size * 0.6);
      vertex(size * 0.5, 0);
      vertex(0, size * 0.7);
      vertex(-size * 0.5, 0);
      endShape(CLOSE);

      // 尾带
      stroke(220, 120, 40);
      strokeWeight(2);
      const tailLen = 70;
      line(0, size * 0.7, 0, size * 0.7 + tailLen);
      pop();

      // 绘制质心标记
      fill(50);
      noStroke();
      circle(kiteCenter.x, kiteCenter.y, 6);

      // 力向量可视化
      if (vectorsToggle.checked) {
        drawArrow(kiteCenter.x, kiteCenter.y, F_windN * n_hat.x, -F_windN * n_hat.y, '#00bcd4');
        drawArrow(kiteCenter.x, kiteCenter.y, F_drag * d_hat.x, -F_drag * d_hat.y, '#ff9800');
        drawArrow(kiteCenter.x, kiteCenter.y, Fx_T, -Fy_T, '#8e24aa');
        drawArrow(kiteCenter.x, kiteCenter.y, Fx_g, -Fy_g, '#c62828');

        stroke('#607d8b');
        strokeWeight(2);
        drawingContext.setLineDash([6, 6]);
        drawDashedLine(
          kiteCenter.x,
          kiteCenter.y,
          kiteCenter.x + clamp(Rpx * 120, -200, 200),
          kiteCenter.y - clamp(Rpy * 120, -200, 200)
        );
        drawingContext.setLineDash([]);
      }

      // 顶部标题
      fill(30, 50, 80);
      noStroke();
      textAlign(CENTER, TOP);
      textSize(20);
      text('风筝飞行：力的平衡（Lift/Drag/Weight/Tension）', width / 2, 18);
    }

    // =============== 验收自检（手动测试） ===============
    // 1. v_wind = 0 → 状态显示“无风”，风压与阻力接近 0。
    // 2. 固定 theta=35°、beta=10°、ballast=0.4，逐步将风速 0→10：风压二次增长，状态经历“起飞”后趋向“稳定”。
    // 3. 将 theta=60°：状态变为“不稳/失速”，残差 R_perp 明显增大。
    // 4. 关闭“显示向量”开关：箭头隐藏但数值仍实时刷新。
    // 5. 将 ballast 从 0→1：R_perp 数值下降，稳定性增强，更易出现 “Steady”。
  </script>
</body>
</html>
